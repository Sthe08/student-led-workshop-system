<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Workshop Update</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <h1 style="color: #007bff;">Workshop Update</h1>
        
        <p>Hi {{ user_name }},</p>
        
        <p>There have been changes to your workshop:</p>
        
        <div style="background: #f8f9fa; padding: 20px; border-left: 4px solid #007bff; margin: 20px 0;">
            <h2 style="margin-top: 0;">{{ workshop.title }}</h2>
            <p><strong>Changes made:</strong></p>
            <p>{{ changes_made }}</p>
        </div>
        
        <p>Please review the updated details and plan accordingly.</p>
        
        <hr style="border: none; border-top: 1px solid #ddd; margin: 30px 0;">
        <p style="color: #666; font-size: 14px;">
            Student Workshop System
        </p>
    </div>
</body>
</html>
